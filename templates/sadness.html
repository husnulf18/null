<!DOCTYPE html>
<html>

<head>

<title>Sadness Planet</title>

<style>

body{

    background:
    linear-gradient(
    to bottom,
    #0f172a,
    #1e3a8a);

    color:white;

    text-align:center;

    font-family:Segoe UI;

    padding-top:30px;
}

h1{

    font-size:60px;

    color:#60a5fa;
}

p{

    font-size:24px;

    margin:20px;
}

textarea{

    width:70%;

    height:200px;

    padding:20px;

    border-radius:20px;

    font-size:18px;
}

button{

    margin-top:20px;

    padding:15px 40px;

    border:none;

    border-radius:30px;

    font-size:20px;

    cursor:pointer;
}

</style>

</head>

<body>

<h1>😢 Sadness Planet</h1>

<p>
Write what you feel today...
</p>

<textarea
id="journal"
placeholder="I feel...">
</textarea>

<br>

<button onclick="saveJournal()">
💙 Save Journal
</button>

<div id="message"></div>

<br>

<a href="/map">

<button>

🌌 Return To Galaxy

</button>

</a>

<script>

function saveJournal(){

document.getElementById("message").innerHTML =

"<h2>✨ Your feelings have been recorded.</h2>";

}

</script>

</body>

</html>
