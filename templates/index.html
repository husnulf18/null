<!DOCTYPE html>
<html>

<head>

<title>Future Letter</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

font-family:Segoe UI;

background:
linear-gradient(
135deg,
#1e1b4b,
#312e81,
#7c3aed
);

}

.bubble{

width:850px;

padding:50px;

text-align:center;

border-radius:40px;

background:
rgba(255,255,255,0.12);

backdrop-filter:blur(20px);

color:white;
}

h1{
font-size:55px;
margin-bottom:20px;
}

p{
margin-bottom:25px;
}

input,
textarea{

width:100%;

padding:15px;

margin-bottom:15px;

border:none;

border-radius:15px;

font-size:18px;
}

textarea{
height:150px;
}

button{

width:100%;

padding:15px;

border:none;

border-radius:15px;

font-size:18px;

background:
linear-gradient(
90deg,
#ff6ec7,
#7c3aed
);

color:white;

cursor:pointer;
}

a{
color:white;
}

</style>

</head>

<body>

<div class="bubble">

<h1>💌 Future Letter</h1>

<p>
Tulis surat untuk dirimu di masa depan
</p>

<form action="/simpan" method="POST">

<input
type="text"
name="nama"
placeholder="Nama"
required>

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="text"
name="alamat"
placeholder="Alamat"
required>

<input
type="date"
name="tanggal"
required>

<textarea
name="isi"
placeholder="Tulis suratmu..."
required></textarea>

<button type="submit">

Simpan Surat

</button>

</form>

<br>

<a href="/surat">
Lihat Semua Surat
</a>

</div>

</body>

</html>
